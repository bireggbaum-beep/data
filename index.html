<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 Codex des Ombres</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e8e8e8; padding: 20px; line-height: 1.6; }
        .header { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .title { color: #ffd700; margin-bottom: 10px; }
        .text-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s; }
        .read-btn { background: #ffd700; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; align-items: center; gap: 8px; width: 100%; justify-content: center; }
        .read-btn.playing { background: #ff4b2b; color: white; }
        .loading { text-align: center; padding: 40px; color: #ffd700; font-style: italic; }
        .highlight { color: #ffd700; background: rgba(255, 215, 0, 0.1); padding: 2px 4px; border-radius: 4px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; display: inline-block; margin-right: 5px; }
        .status-active { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">📜 Codex des Ombres</h1>
        <p><span id="statusIndicator" class="status-dot"></span> <span id="statusText">Initialisation...</span></p>
    </div>

    <main id="textContainer">
        <div class="loading">Chargement des données GitHub...</div>
    </main>

    <script>
        // Nutze deine echte RAW-URL hier!
        const GITHUB_JSON_URL = "https://raw.githubusercontent.com/bireggbaum-beep/data/refs/heads/main/texts_fr.json";
        
        let synth = window.speechSynthesis;
        let ttsData = {
            chunks: [],
            currentIdx: 0,
            isPlaying: false,
            btnRef: null,
            watchdog: null
        };

        async function loadData() {
            try {
                const response = await fetch(`${GITHUB_JSON_URL}?t=${Date.now()}`);
                const data = await response.json();
                renderTexts(data);
                updateStatus("Prêt", false);
            } catch (err) {
                document.getElementById('textContainer').innerHTML = `<p style="color:#ff6b6b">Erreur de chargement: ${err.message}</p>`;
            }
        }

        function updateStatus(msg, active) {
            document.getElementById('statusText').innerText = msg;
            document.getElementById('statusIndicator').className = 'status-dot' + (active ? ' status-active' : '');
        }

        function renderTexts(texts) {
            const container = document.getElementById('textContainer');
            container.innerHTML = "";
            texts.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'text-card';
                card.innerHTML = `
                    <h3 style="color:#ffd700">${item.title}</h3>
                    <p id="txt-${index}" style="margin:10px 0">${item.text}</p>
                    <button id="btn-${index}" class="read-btn" onclick="handleTTS(${index})">
                        <span>▶</span> Lire ce chapitre
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function handleTTS(id) {
            if (ttsData.isPlaying && ttsData.btnRef === document.getElementById(`btn-${id}`)) {
                stopEverything();
                return;
            }

            stopEverything();
            
            const rawText = document.getElementById(`txt-${id}`).innerText;
            // Extrem robustes Splitting: Bei Punkt, Komma, Semikolon oder Doppelpunkt
            ttsData.chunks = rawText.match(/[^.!?,:;]+[.!?,:;]*/g) || [rawText];
            ttsData.currentIdx = 0;
            ttsData.isPlaying = true;
            ttsData.btnRef = document.getElementById(`btn-${id}`);
            
            ttsData.btnRef.classList.add('playing');
            ttsData.btnRef.innerHTML = '<span>⏹</span> Arrêter';
            
            updateStatus("Lecture en cours...", true);
            playNextChunk();
        }

        function playNextChunk() {
            if (!ttsData.isPlaying || ttsData.currentIdx >= ttsData.chunks.length) {
                stopEverything();
                return;
            }

            // Cleanup vor neuem Chunk (wichtig für Android!)
            synth.cancel();

            const textToSpeak = ttsData.chunks[ttsData.currentIdx].trim();
            if (textToSpeak.length < 1) {
                ttsData.currentIdx++;
                playNextChunk();
                return;
            }

            const utter = new SpeechSynthesisUtterance(textToSpeak);
            utter.lang = 'fr-FR';
            utter.rate = 0.95; // Etwas langsamer ist stabiler

            utter.onstart = () => {
                resetWatchdog();
            };

            utter.onend = () => {
                clearTimeout(ttsData.watchdog);
                ttsData.currentIdx++;
                // Kurze Pause zwischen Chunks hilft dem Browser sich zu fangen
                setTimeout(playNextChunk, 100); 
            };

            utter.onerror = (e) => {
                console.error("TTS Error:", e);
                // Bei Fehler: Kurz warten und diesen Chunk nochmal probieren
                setTimeout(playNextChunk, 500);
            };

            // Der entscheidende Trick: speechSynthesis.speak() erst nach einem winzigen Timeout
            setTimeout(() => {
                synth.speak(utter);
                // Extra Android "Push"
                if (synth.paused) synth.resume();
            }, 50);
        }

        function resetWatchdog() {
            clearTimeout(ttsData.watchdog);
            // Wenn ein Satz länger als 15 Sek braucht, stimmt was nicht -> Restart Chunk
            ttsData.watchdog = setTimeout(() => {
                if (ttsData.isPlaying) {
                    console.log("Watchdog triggered: Restarting Chunk");
                    synth.cancel();
                    playNextChunk();
                }
            }, 15000);
        }

        function stopEverything() {
            ttsData.isPlaying = false;
            synth.cancel();
            clearTimeout(ttsData.watchdog);
            updateStatus("Prêt", false);
            
            document.querySelectorAll('.read-btn').forEach(b => {
                b.classList.remove('playing');
                b.innerHTML = '<span>▶</span> Lire ce chapitre';
            });
        }

        // Fix für Android Chrome: Stimmen müssen initialisiert sein
        window.onload = () => {
            loadData();
            // Android braucht oft einen User-Gesture um die Voices zu laden
            synth.getVoices();
        };

        // Verhindert Abbruch bei Standby/Tab-Wechsel (versucht es zumindest)
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible' && ttsData.isPlaying) {
                synth.resume();
            }
        });
    </script>
</body>
</html>
